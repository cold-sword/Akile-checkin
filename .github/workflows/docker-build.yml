name: Build and Push Docker Image

on:
  # 上游有更新时触发（通过 pull 上游后检测变更）
  schedule:
    # 每天 UTC 02:00 检查上游更新（北京时间 10:00）
    - cron: '0 2 * * *'
  # 手动触发
  workflow_dispatch:
  # 推送到 main 时自动构建
  push:
    branches: [main]

jobs:
  sync-upstream:
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.check.outputs.has_changes }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream
        run: |
          git remote add upstream https://github.com/luoxiaoxin123/Akile-checkin.git

      - name: Fetch upstream
        run: git fetch upstream

      - name: Check for upstream changes
        id: check
        run: |
          # 检查上游是否有当前分支没有的提交
          UPSTREAM_HEAD=$(git rev-parse upstream/main)
          LOCAL_HEAD=$(git rev-parse HEAD)
          echo "Upstream HEAD: $UPSTREAM_HEAD"
          echo "Local HEAD: $LOCAL_HEAD"

          if [ "$UPSTREAM_HEAD" != "$LOCAL_HEAD" ]; then
            # 检查上游提交是否已经被 merge（通过 commit message 搜索）
            MERGED=$(git log --oneline | grep -c "Merge.*upstream" || true)
            echo "Previous upstream merges: $MERGED"

            # 直接用 merge-base 比较
            MERGE_BASE=$(git merge-base HEAD upstream/main)
            if [ "$MERGE_BASE" != "$UPSTREAM_HEAD" ]; then
              echo "has_changes=true" >> $GITHUB_OUTPUT
              echo "Upstream has new commits, will sync and build"

              # 合并上游变更
              git merge upstream/main --no-edit --allow-unrelated-histories || {
                echo "Merge conflict, will still build with current code"
                git merge --abort
              }
            else
              echo "has_changes=false" >> $GITHUB_OUTPUT
              echo "Already up to date"
            fi
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "Already at upstream HEAD"
          fi

      - name: Push merged changes
        if: steps.check.outputs.has_changes == 'true'
        run: git push origin main

  build:
    needs: sync-upstream
    # push 事件直接构建，schedule 只有上游更新才构建
    if: |
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      needs.sync-upstream.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/akile-checkin:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/akile-checkin:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/akile-checkin:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/akile-checkin:buildcache,mode=max
